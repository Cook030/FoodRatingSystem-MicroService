syntax = "proto3";

package rating;

option go_package = "foodRatingSystem/proto/rating";

service RatingService {
  rpc SubmitRating(SubmitRatingRequest) returns (SubmitRatingResponse);
  rpc GetRatingsByRestaurantID(RestaurantIDRequest) returns (RatingsResponse);
}

message SubmitRatingRequest {
  uint32 user_id = 1;
  int32 restaurant_id = 2;
  string restaurant_name = 3;
  double stars = 4;
  string comment = 5;
}

message SubmitRatingResponse {
  string message = 1;
}

message RestaurantIDRequest {
  int32 id = 1;
}

message RatingMessage {
  uint32 id = 1;
  uint32 user_id = 2;
  uint32 restaurant_id = 3;
  double stars = 4;
  string comment = 5;
  string created_at = 6;
  string username = 7;
}

message RatingsResponse {
  repeated RatingMessage ratings = 1;
}

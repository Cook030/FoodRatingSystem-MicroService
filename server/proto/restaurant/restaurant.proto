syntax = "proto3";

package restaurant;

option go_package = "foodRatingSystem/proto/restaurant";

service RestaurantService {
  rpc GetNearbyRestaurants(NearbyRequest) returns (NearbyResponse);
  rpc GetRecommendedRestaurants(RecommendRequest) returns (RecommendResponse);
  rpc GetRestaurants(SearchRequest) returns (SearchResponse);
  rpc GetRestaurantDetail(RestaurantIDRequest) returns (RestaurantDetailResponse);
  rpc GetRestaurantRatings(RestaurantIDRequest) returns (RestaurantRatingsResponse);
  rpc CreateRestaurant(CreateRestaurantRequest) returns (CreateRestaurantResponse);
  rpc InvalidateCache(InvalidateCacheRequest) returns (InvalidateCacheResponse);
}

message RestaurantMessage {
  uint32 id = 1;
  string name = 2;
  double latitude = 3;
  double longitude = 4;
  double avg_score = 5;
  string category = 6;
  int32 review_count = 7;
}

message NearbyRequest {
  double lat = 1;
  double lon = 2;
}

message RestaurantWithDistance {
  uint32 id = 1;
  string name = 2;
  double latitude = 3;
  double longitude = 4;
  double avg_score = 5;
  string category = 6;
  int32 review_count = 7;
  double distance = 8;
}

message NearbyResponse {
  repeated RestaurantWithDistance restaurants = 1;
}

message RecommendRequest {
  double lat = 1;
  double lon = 2;
}

message RestaurantWithScore {
  uint32 id = 1;
  string name = 2;
  double latitude = 3;
  double longitude = 4;
  double avg_score = 5;
  string category = 6;
  int32 review_count = 7;
  double distance = 8;
  double final_score = 9;
}

message RecommendResponse {
  repeated RestaurantWithScore restaurants = 1;
}

message SearchRequest {
  double lat = 1;
  double lon = 2;
  string search = 3;
  string sort = 4;
  bool has_location = 5;
}

message SearchResponse {
  repeated RestaurantWithScore restaurants = 1;
}

message RestaurantIDRequest {
  int32 id = 1;
}

message RestaurantDetailResponse {
  uint32 id = 1;
  string name = 2;
  double latitude = 3;
  double longitude = 4;
  double avg_score = 5;
  string category = 6;
  int32 review_count = 7;
}

message RatingMessage {
  uint32 id = 1;
  uint32 user_id = 2;
  uint32 restaurant_id = 3;
  double stars = 4;
  string comment = 5;
  string created_at = 6;
  string username = 7;
}

message RestaurantRatingsResponse {
  repeated RatingMessage ratings = 1;
}

message CreateRestaurantRequest {
  string name = 1;
  double latitude = 2;
  double longitude = 3;
  string category = 4;
}

message CreateRestaurantResponse {
  uint32 id = 1;
  string name = 2;
  double latitude = 3;
  double longitude = 4;
  double avg_score = 5;
  string category = 6;
  int32 review_count = 7;
}

message InvalidateCacheRequest {
  int32 restaurant_id = 1;
}

message InvalidateCacheResponse {
  bool success = 1;
}
